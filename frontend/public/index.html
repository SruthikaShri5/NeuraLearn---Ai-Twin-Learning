<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#118AB2" />
        <meta name="description" content="NeuraLearn - Adaptive learning ecosystem for specially-abled students" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="NeuraLearn" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css" />
        <title>NeuraLearn - Adaptive Learning</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

        <!-- Suppress ResizeObserver benign loop warning in development -->
        <script>
          const _resizeObserverErr = window.onerror;
          window.onerror = function(msg, src, line, col, err) {
            if (msg && msg.includes('ResizeObserver loop')) return true;
            if (_resizeObserverErr) return _resizeObserverErr(msg, src, line, col, err);
          };
          // Also suppress in React error overlay
          const _consoleError = console.error;
          console.error = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('ResizeObserver')) return;
            _consoleError.apply(console, args);
          };
        </script>

        <!-- Service Worker Registration -->
        <script>
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
              navigator.serviceWorker.register('/service-worker.js')
                .then(function(reg) {
                  console.log('[NeuraLearn] Service Worker registered:', reg.scope);
                })
                .catch(function(err) {
                  console.log('[NeuraLearn] Service Worker registration failed:', err);
                });
            });
          }
        </script>
    </body>
</html>
