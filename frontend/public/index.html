<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#118AB2" />
        <meta name="description" content="NeuraLearn - Adaptive learning ecosystem for specially-abled students" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="NeuraLearn" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <title>NeuraLearn - Adaptive Learning</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

        <!-- Suppress ResizeObserver benign loop warning in development -->
        <script>
          const _resizeObserverErr = window.onerror;
          window.onerror = function(msg, src, line, col, err) {
            if (msg && msg.includes('ResizeObserver loop')) return true;
            if (_resizeObserverErr) return _resizeObserverErr(msg, src, line, col, err);
          };
          // Also suppress in React error overlay
          const _consoleError = console.error;
          console.error = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('ResizeObserver')) return;
            _consoleError.apply(console, args);
          };
        </script>

        <!-- Chatbase AI Widget -->
        <script>
          (function(){
            if(!window.chatbase||window.chatbase("getState")!=="initialized"){
              window.chatbase=(...arguments)=>{
                if(!window.chatbase.q){window.chatbase.q=[]}
                window.chatbase.q.push(arguments)
              };
              window.chatbase=new Proxy(window.chatbase,{
                get(target,prop){
                  if(prop==="q"){return target.q}
                  return(...args)=>target(prop,...args)
                }
              })
            }
            const onLoad=function(){
              const script=document.createElement("script");
              script.src="https://www.chatbase.co/embed.min.js";
              script.id="WarVtctn0Yc3S8bHhvkPk";
              script.domain="www.chatbase.co";
              document.body.appendChild(script)
            };
            if(document.readyState==="complete"){onLoad()}
            else{window.addEventListener("load",onLoad)}
          })();
        </script>
    </body>
</html>
