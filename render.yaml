services:
  - type: web
    name: neuralearn-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: neuralearn
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@neuralearn.com
      - key: ADMIN_PASSWORD
        sync: false
